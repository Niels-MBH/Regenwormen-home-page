<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebGazer Test</title>

<script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#eee;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

button{
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
}

#tracker{
    position:fixed;
    width:20px;
    height:20px;
    border-radius:50%;
    background:blue;
    pointer-events:none;
    transform:translate(-50%, -50%);
    z-index:99999;
    display:none;
}

.dot{
    position:fixed;
    width:35px;
    height:35px;
    border-radius:50%;
    background:red;
    transform:translate(-50%, -50%);
    cursor:pointer;
    border:3px solid white;
}

</style>
</head>

<body>

<h1>WebGazer</h1>

<button id="start">
START
</button>

<div id="tracker"></div>

<div class="dot" style="top:10%;left:10%"></div>
<div class="dot" style="top:10%;left:50%"></div>
<div class="dot" style="top:10%;left:90%"></div>

<div class="dot" style="top:50%;left:10%"></div>
<div class="dot" style="top:50%;left:50%"></div>
<div class="dot" style="top:50%;left:90%"></div>

<div class="dot" style="top:85%;left:10%"></div>
<div class="dot" style="top:85%;left:50%"></div>
<div class="dot" style="top:85%;left:90%"></div>

<script>

const start = document.getElementById("start");
const tracker = document.getElementById("tracker");

let started = false;

start.onclick = async () => {

    try{

        webgazer.setRegression("ridge");

        webgazer.setGazeListener((data) => {

            if(!data) return;

            tracker.style.display = "block";

            tracker.style.left = data.x + "px";
            tracker.style.top = data.y + "px";

        });

        await webgazer.begin();

        started = true;

        alert("webgazer gestart");

    }catch(err){

        console.error(err);

        alert(err.message);

    }

};

document.querySelectorAll(".dot").forEach(dot => {

    dot.onclick = () => {

        if(!started){

            alert("start eerst");

            return;
        }

        dot.style.background = "green";

    };

});

</script>

</body>
</html>
