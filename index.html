<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eye Tracking Stable</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#050b16;
}

video{
  position:fixed;
  left:20px;
  bottom:20px;
  width:280px;
  border-radius:12px;
}

#gazeCursor{
  position:fixed;
  width:30px;
  height:30px;
  border-radius:50%;
  border:3px solid #00e5ff;
  transform:translate(-50%,-50%);
  pointer-events:none;
  box-shadow:0 0 20px #00e5ff;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="gazeCursor"></div>

<script>

const video = document.getElementById("video");
const cursor = document.getElementById("gazeCursor");

// =====================
// SMOOTH (belangrijk)
// =====================
let x = window.innerWidth/2;
let y = window.innerHeight/2;

// =====================
// FACE MESH
// =====================
const faceMesh = new FaceMesh({
  locateFile: (file)=>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces:1,
  refineLandmarks:true,
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
});

// =====================
// STABLE GAZE ENGINE
// =====================
faceMesh.onResults(results => {

  if(!results.multiFaceLandmarks) return;

  const f = results.multiFaceLandmarks[0];

  // 👁️ iris
  const lIris = f[468];
  const rIris = f[473];

  // 👁️ eye corners
  const lOuter = f[33];
  const lInner = f[133];

  const rInner = f[362];
  const rOuter = f[263];

  // 🧠 face center (BELANGRIJK tegen head movement)
  const faceCenterX = (f[1].x + f[152].x) / 2;
  const faceCenterY = (f[1].y + f[152].y) / 2;

  // 👁️ relative iris offset (KEY FIX)
  const eyeOffsetX =
    ((lIris.x + rIris.x)/2) - faceCenterX;

  const eyeOffsetY =
    ((lIris.y + rIris.y)/2) - faceCenterY;

  // 🔥 scaling (gevoeligheid)
  const sensitivity = 3.0;

  let targetX = (eyeOffsetX * sensitivity + 0.5) * window.innerWidth;
  let targetY = (eyeOffsetY * sensitivity + 0.5) * window.innerHeight;

  // 🧊 clamp
  targetX = Math.max(0, Math.min(window.innerWidth, targetX));
  targetY = Math.max(0, Math.min(window.innerHeight, targetY));

  // 🧠 smoothing (EMA)
  const alpha = 0.75;
  x = x*alpha + targetX*(1-alpha);
  y = y*alpha + targetY*(1-alpha);

  cursor.style.left = x + "px";
  cursor.style.top = y + "px";
});

// =====================
// CAMERA
// =====================
const camera = new Camera(video,{
  onFrame: async () => {
    await faceMesh.send({image:video});
  },
  width:640,
  height:480
});

camera.start();

</script>

</body>
</html>
