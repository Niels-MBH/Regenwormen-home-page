<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Eye Tracking (Fixed Gaze)</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#050b16;
  color:white;
  font-family:Arial;
}

video{
  position:fixed;
  left:20px;
  bottom:20px;
  width:280px;
  border-radius:12px;
  border:2px solid #1f3b66;
  z-index:2;
}

canvas{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  pointer-events:none;
}

#gazeCursor{
  position:fixed;
  width:30px;
  height:30px;
  border-radius:50%;
  border:3px solid #00e5ff;
  background:rgba(0,229,255,0.2);
  box-shadow:0 0 20px #00e5ff;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="gazeCursor"></div>

<script>

const video = document.getElementById("video");
const cursor = document.getElementById("gazeCursor");

let smoothX = window.innerWidth/2;
let smoothY = window.innerHeight/2;

function smooth(targetX,targetY){
  const f = 0.85;
  smoothX = smoothX*f + targetX*(1-f);
  smoothY = smoothY*f + targetY*(1-f);
  return {x:smoothX,y:smoothY};
}

function normalize(v,min,max){
  return (v-min)/(max-min);
}

const faceMesh = new FaceMesh({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces:1,
  refineLandmarks:true,
  minDetectionConfidence:0.5,
  minTrackingConfidence:0.5
});

faceMesh.onResults(results => {

  if(!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0){
    return;
  }

  const face = results.multiFaceLandmarks[0];

  // 👁️ ooghoeken
  const leftEyeOuter = face[33];
  const leftEyeInner = face[133];

  const rightEyeInner = face[362];
  const rightEyeOuter = face[263];

  // 👁️ iris centers
  const leftIris = face[468];
  const rightIris = face[473];

  // 🔥 HORIZONTALE GAZE (belangrijkste fix)
  const leftGazeX = normalize(leftIris.x, leftEyeOuter.x, leftEyeInner.x);
  const rightGazeX = normalize(rightIris.x, rightEyeInner.x, rightEyeOuter.x);

  const gazeX = (leftGazeX + (1 - rightGazeX)) / 2;

  // 🔥 VERTICAAL
  const topEye = face[159];
  const bottomEye = face[145];

  const gazeY = normalize(
    (leftIris.y + rightIris.y)/2,
    topEye.y,
    bottomEye.y
  );

  // 📍 naar screen
  let screenX = gazeX * window.innerWidth;
  let screenY = gazeY * window.innerHeight;

  // 🔥 smoothing
  const sm = smooth(screenX,screenY);

  cursor.style.left = sm.x + "px";
  cursor.style.top = sm.y + "px";
});

const camera = new Camera(video,{
  onFrame: async () => {
    await faceMesh.send({image:video});
  },
  width:640,
  height:480
});

camera.start();

</script>

</body>
</html>
