<script>
/* =========================================================
   CONFIG
========================================================= */

const CONFIG = {
  SMOOTHING: 0.8,
  CLICKS_PER_DOT: 5
};

const state = {
  tracking:false,
  smoothX:window.innerWidth/2,
  smoothY:window.innerHeight/2,
  currentDot:0,
  currentClicks:0
};

const gazeCursor = document.getElementById("gaze-cursor");

let calibrationDots = [];

/* =========================================================
   SMOOTHING
========================================================= */

function smooth(rawX, rawY){

  const a = CONFIG.SMOOTHING;

  state.smoothX = a * state.smoothX + (1-a) * rawX;
  state.smoothY = a * state.smoothY + (1-a) * rawY;

  return {
    x: state.smoothX,
    y: state.smoothY
  };

}

/* =========================================================
   WEBGAZER START
========================================================= */

async function startTracking(){

  try{

    // FIX:
    // setTracker en setRegression verwijderd
    // omdat jouw WebGazer build daar fouten op geeft

    await webgazer
      .setGazeListener(onGaze)
      .showPredictionPoints(false)
      .begin();

    state.tracking = true;

    document.getElementById("instruction-banner").innerHTML =
      "Tracking actief. Klik op Kalibreer.";

    styleWebGazer();

    console.log("Tracking gestart");

  }catch(err){

    console.error(err);
    alert("Fout bij starten: " + err.message);

  }

}

/* =========================================================
   WEBGAZER STYLE FIX
========================================================= */

function styleWebGazer(){

  const ids = [
    "webgazerVideoFeed",
    "webgazerVideoCanvas",
    "webgazerFaceOverlay",
    "webgazerFaceFeedbackBox"
  ];

  ids.forEach(id=>{

    const el = document.getElementById(id);

    if(el){

      el.style.zIndex = "1";
      el.style.position = "fixed";
      el.style.bottom = "16px";
      el.style.left = "16px";

    }

  });

}

/* =========================================================
   GAZE CALLBACK
========================================================= */

function onGaze(data){

  if(!data){

    document.getElementById("face-status").textContent = "nee";
    return;

  }

  document.getElementById("face-status").textContent = "ja";

  const smoothed = smooth(data.x, data.y);

  const x = Math.max(0, Math.min(window.innerWidth, smoothed.x));
  const y = Math.max(0, Math.min(window.innerHeight, smoothed.y));

  gazeCursor.style.left = x + "px";
  gazeCursor.style.top = y + "px";

  document.getElementById("coord-x").textContent = Math.round(x);
  document.getElementById("coord-y").textContent = Math.round(y);

  // Gebruik later in je spel
  window.EyeTracker = {
    x,
    y,
    pctX:x/window.innerWidth,
    pctY:y/window.innerHeight
  };

}

/* =========================================================
   CALIBRATIE
========================================================= */

function calibrationPositions(){

  return [
    [0.1,0.1],
    [0.5,0.1],
    [0.9,0.1],

    [0.1,0.5],
    [0.5,0.5],
    [0.9,0.5],

    [0.1,0.9],
    [0.5,0.9],
    [0.9,0.9]
  ];

}

function createCalibration(){

  removeCalibration();

  const positions = calibrationPositions();

  positions.forEach((pos,index)=>{

    const dot = document.createElement("div");

    dot.className = "cal-dot";
    dot.innerText = index+1;

    dot.style.left = (pos[0]*window.innerWidth)+"px";
    dot.style.top = (pos[1]*window.innerHeight)+"px";

    dot.addEventListener("click", ()=>clickCalibration(index));

    document.body.appendChild(dot);

    calibrationDots.push(dot);

  });

  activateDot(0);

}

function activateDot(index){

  calibrationDots.forEach((dot,i)=>{

    dot.classList.remove("active");

    if(i === index){
      dot.classList.add("active");
    }

  });

  state.currentDot = index;
  state.currentClicks = 0;

}

function clickCalibration(index){

  if(index !== state.currentDot) return;

  const positions = calibrationPositions();

  const x = positions[index][0] * window.innerWidth;
  const y = positions[index][1] * window.innerHeight;

  webgazer.recordScreenPosition(x,y,'click');

  state.currentClicks++;

  if(state.currentClicks >= CONFIG.CLICKS_PER_DOT){

    calibrationDots[index].classList.remove("active");
    calibrationDots[index].classList.add("done");

    if(index >= calibrationDots.length-1){

      document.getElementById("instruction-banner").innerHTML =
        "✅ Kalibratie klaar";

    }else{

      activateDot(index+1);

    }

  }

}

function removeCalibration(){

  calibrationDots.forEach(dot=>dot.remove());
  calibrationDots=[];

}

/* =========================================================
   RESET
========================================================= */

function resetEverything(){

  try{
    webgazer.end();
  }catch(e){}

  removeCalibration();

  state.tracking = false;

  gazeCursor.style.left = "-100px";
  gazeCursor.style.top = "-100px";

  document.getElementById("instruction-banner").innerHTML =
    "Gereset.";

}

/* =========================================================
   EVENTS
========================================================= */

document.getElementById("btn-splash-start")
  .addEventListener("click", ()=>{

    document.getElementById("splash").style.display = "none";

    startTracking();

});

document.getElementById("btn-start")
  .addEventListener("click", startTracking);

document.getElementById("btn-calibrate")
  .addEventListener("click", createCalibration);

document.getElementById("btn-reset")
  .addEventListener("click", resetEverything);

window.addEventListener("resize", ()=>{

  if(calibrationDots.length){

    const positions = calibrationPositions();

    calibrationDots.forEach((dot,i)=>{

      dot.style.left = (positions[i][0]*window.innerWidth)+"px";
      dot.style.top = (positions[i][1]*window.innerHeight)+"px";

    });

  }

});
</script>
