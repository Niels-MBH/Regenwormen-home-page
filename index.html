<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐛 Regenwormen</title>

<!-- MediaPipe (nog niet gebruikt in deze snippet) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
/* ───────────── FONTS ───────────── */
@font-face{
  font-family:'Fredoka One';
  font-weight:400;
  font-display:swap;
  src:url(https://fonts.gstatic.com/s/fredokaone/v15/k3kUo8kEI-tA1RRcTZGmTlHGCac.woff2) format('woff2');
}

@font-face{
  font-family:'Nunito';
  font-weight:400;
  font-display:swap;
  src:url(https://fonts.gstatic.com/s/nunito/v32/XRXV3I6Li01BKofINeaB.woff2) format('woff2');
}

@font-face{
  font-family:'Nunito';
  font-weight:700;
  font-display:swap;
  src:url(https://fonts.gstatic.com/s/nunito/v32/XRXV3I6Li01BKofIO-aBXso.woff2) format('woff2');
}

/* ───────────── RESET ───────────── */
*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Nunito',sans-serif;
  background:#2a5c38;
  min-height:100vh;
  color:#2c1810;
  background-image:
    radial-gradient(ellipse at top left,rgba(255,255,255,.06),transparent 55%),
    radial-gradient(ellipse at bottom right,rgba(0,0,0,.18),transparent 55%);
}

/* ───────────── SCREENS ───────────── */
.screen{ display:none; }
.screen.active{ display:block; }

/* ───────────── SETUP ───────────── */
#setup{
  max-width:560px;
  margin:0 auto;
  padding:2rem 1rem;
  text-align:center;
}

.logo-worm{ font-size:3rem; }
.logo{
  font-family:'Fredoka One',sans-serif;
  font-size:3.8rem;
  color:#f5b731;
  text-shadow:3px 4px 0 #c8901a;
}

.logo-sub{
  color:rgba(255,255,255,.65);
  font-size:1rem;
  font-weight:700;
  margin-bottom:1.75rem;
}

.card{
  background:#fdf6e3;
  border-radius:24px;
  padding:1.75rem;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}

/* ───────────── INPUTS ───────────── */
.field-label{
  display:block;
  text-align:left;
  font-weight:800;
  font-size:.82rem;
  text-transform:uppercase;
  margin-bottom:.55rem;
}

.count-row{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-bottom:1.4rem;
}

.count-btn{
  width:52px;
  height:52px;
  border-radius:50%;
  border:3px solid #ddd;
  background:#fff;
  font-family:'Fredoka One';
  cursor:pointer;
}

.count-btn.active{
  background:#2ecc71;
  border-color:#1a9e52;
  color:#fff;
  transform:scale(1.1);
}

/* ───────────── INPUT FIELDS ───────────── */
.name-inputs{
  display:grid;
  gap:8px;
}

.name-input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:2px solid #e0d8c8;
  font-weight:700;
}

/* ───────────── BUTTONS ───────────── */
.big-btn{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  font-family:'Fredoka One';
  font-size:1.2rem;
  cursor:pointer;
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn-green{ background:#2ecc71; color:#fff; }
.btn-blue{ background:#3498db; color:#fff; }
.btn-orange{ background:#e67e22; color:#fff; }
.btn-yellow{ background:#f5b731; color:#fff; }

.big-btn:disabled{ opacity:.4; }

/* ───────────── DWELL ───────────── */
.dwell-ring{
  position:absolute;
  inset:0;
  border-radius:inherit;
  background:conic-gradient(rgba(0,0,0,.85) 0deg, transparent 0deg);
  box-shadow:inset 0 0 0 3px rgba(0,0,0,.25);
}
</style>
</head>

<body>

<div id="eyeCursor"></div>

<!-- SETUP -->
<div id="setup" class="screen active">
  <div class="logo-worm">🐛</div>
  <div class="logo">Regenwormen</div>
  <div class="logo-sub">Scharrelen met dobbelstenen — 2 tot 7 spelers</div>

  <div class="card">
    <label class="field-label">Hoeveel spelers?</label>
    <div class="count-row" id="countRow"></div>

    <label class="field-label">Namen</label>
    <div class="name-inputs" id="nameInputs"></div>

    <button class="big-btn btn-green" onclick="startGame()">🐛 Spel starten<div class="dwell-ring"></div></button>
    <br>
    <button class="big-btn btn-blue" onclick="startTracking()">👁️ Eye tracking aan<div class="dwell-ring"></div></button>
    <br>
    <button class="big-btn btn-yellow" onclick="toggleSound()">🔊 Geluid aan<div class="dwell-ring"></div></button>
    <br>
    <button class="big-btn btn-orange" onclick="showRules()">📜 Spelregels<div class="dwell-ring"></div></button>
  </div>
</div>

<!-- RULES -->
<div id="rules" class="screen">
  <div class="card">
    <div class="logo">📜 Spelregels</div>

    <div class="card" style="text-align:left; line-height:1.6;">
      <h3>🎯 Doel</h3>
      Verzamel zoveel mogelijk wormen.

      <h3>🎲 Spelverloop</h3>
      Gooi dobbelstenen, kies gelijke waarden en bouw score op.

      <h3>🏆 Winnaar</h3>
      Meeste wormen = winst.
    </div>

    <button class="big-btn btn-green" onclick="showScreen('setup')">⬅ Terug<div class="dwell-ring"></div></button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="playersGrid"></div>
</div>

<!-- GAME OVER -->
<div id="gameover" class="screen">
  <div>🏆 Einde spel!</div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="msg-box">
    <div id="mIcon">😢</div>
    <div id="mTitle"></div>
    <div id="mText"></div>
    <button onclick="closeOverlay()">OK<div class="dwell-ring"></div></button>
  </div>
</div>

</body>
</html>
