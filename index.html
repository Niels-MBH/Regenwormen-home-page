<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐛 Regenwormen</title>

<style>

/* ── Fonts ── */
@font-face{
  font-family:'Fredoka One';
  font-weight:400;
  font-display:swap;
  src:url(https://fonts.gstatic.com/s/fredokaone/v15/k3kUo8kEI-tA1RRcTZGmTlHGCac.woff2) format('woff2');
}

@font-face{
  font-family:'Nunito';
  font-weight:400;
  font-display:swap;
  src:url(https://fonts.gstatic.com/s/nunito/v32/XRXV3I6Li01BKofINeaB.woff2) format('woff2');
}

@font-face{
  font-family:'Nunito';
  font-weight:700;
  font-display:swap;
  src:url(https://fonts.gstatic.com/s/nunito/v32/XRXV3I6Li01BKofIO-aBXso.woff2) format('woff2');
}

/* RESET */
*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Nunito',sans-serif;
  background:#2a5c38;
  min-height:100vh;
  color:#2c1810;
  background-image:
    radial-gradient(ellipse at top left,rgba(255,255,255,.06) 0%,transparent 55%),
    radial-gradient(ellipse at bottom right,rgba(0,0,0,.18) 0%,transparent 55%);
}

/* setup (ALLEEN HOME DEEL) */
#setup{
  max-width:560px;
  margin:0 auto;
  padding:2rem 1rem;
  text-align:center;
}

.logo-worm{font-size:3rem;}
.logo{
  font-family:'Fredoka One',sans-serif;
  font-size:3.8rem;
  color:#f5b731;
}
.logo-sub{
  color:rgba(255,255,255,.65);
  font-size:1rem;
  font-weight:700;
  margin-bottom:1.5rem;
}

.card{
  background:#fdf6e3;
  border-radius:24px;
  padding:1.75rem;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}

.field-label{
  display:block;
  text-align:left;
  font-weight:800;
  font-size:.82rem;
  color:#7a4a1e;
  margin-bottom:.55rem;
}

.count-row{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-bottom:1.4rem;
}

.count-btn{
  width:52px;
  height:52px;
  border-radius:50%;
  border:3px solid #ddd;
  background:#fff;
  font-family:'Fredoka One',sans-serif;
  cursor:pointer;
}

.count-btn.active{
  background:#2ecc71;
  color:#fff;
}

.name-inputs{
  display:grid;
  gap:8px;
  margin-bottom:1.4rem;
}

.name-input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:2px solid #e0d8c8;
  font-family:'Nunito',sans-serif;
}

.big-btn{
  width:100%;
  padding:18px;
  border:none;
  border-radius:18px;
  font-family:'Fredoka One',sans-serif;
  font-size:1.3rem;
  background:#2ecc71;
  color:white;
  cursor:pointer;
}

a{text-decoration:none;}

</style>
</head>

<body>

<div id="setup">

  <div class="logo-worm">🐛</div>
  <div class="logo">Regenwormen</div>
  <div class="logo-sub">Scharrelen met dobbelstenen — 2 tot 7 spelers</div>

  <div class="card">

    <label class="field-label">Hoeveel spelers?</label>
    <div class="count-row" id="countRow"></div>

    <label class="field-label">Namen</label>
    <div class="name-inputs" id="nameInputs"></div>

    <a href="game.html">
      <button class="big-btn">🐛 Start spel</button>
    </a>

  </div>

</div>

<script>

/* setup logica (ongewijzigd gedrag) */

let numPlayers = 2;
const defNames = ['Anna','Boris','Carmen','David','Eva','Floris','Gina'];

const row = document.getElementById('countRow');

for(let n=2;n<=7;n++){
  const b=document.createElement('button');
  b.className='count-btn'+(n===2?' active':'');
  b.textContent=n;

  b.onclick=()=>{
    numPlayers=n;
    document.querySelectorAll('.count-btn')
      .forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    buildNames();
  };

  row.appendChild(b);
}

function buildNames(){
  const el=document.getElementById('nameInputs');
  el.innerHTML='';

  for(let i=0;i<numPlayers;i++){
    const inp=document.createElement('input');
    inp.className='name-input';
    inp.placeholder=defNames[i];
    el.appendChild(inp);
  }
}

buildNames();

</script>

</body>
</html>
