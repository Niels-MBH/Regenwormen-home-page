<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>WebGazer Complete Test</title>

    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        h1 {
            margin-top: 20px;
        }

        #startBtn {
            font-size: 18px;
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        #info {
            margin-top: 10px;
            font-size: 16px;
        }

        /* calibratie punten */
        .dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: red;
            position: absolute;
            cursor: pointer;
        }

        #tracker {
            position: fixed;
            width: 12px;
            height: 12px;
            background: blue;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>

<body>

<h1>WebGazer Complete Test</h1>

<button id="startBtn">Start Camera & Tracking</button>
<div id="info">Klik op de rode punten om te calibreren</div>

<!-- live tracker punt -->
<div id="tracker"></div>

<!-- calibratie punten -->
<div class="dot" style="top: 60px; left: 60px;"></div>
<div class="dot" style="top: 60px; right: 60px;"></div>
<div class="dot" style="bottom: 60px; left: 60px;"></div>
<div class="dot" style="bottom: 60px; right: 60px;"></div>
<div class="dot" style="top: 50%; left: 50%;"></div>

<script>
let started = false;

const tracker = document.getElementById("tracker");

document.getElementById("startBtn").onclick = async () => {

    if (started) return;
    started = true;

    await webgazer
        .setRegression('ridge')
        .setGazeListener((data) => {

            if (data == null) return;

            // beweeg blauwe punt naar gaze positie
            tracker.style.left = data.x + "px";
            tracker.style.top = data.y + "px";

            console.log("Gaze:", data.x, data.y);
        })
        .begin();

    // BELANGRIJK: visualisatie aanzetten
    webgazer.showVideoPreview(true)
            .showFaceOverlay(true)
            .showFaceFeedbackBox(true)
            .showPredictionPoints(true);

    document.getElementById("info").innerText =
        "WebGazer actief: kijk rond + klik op rode punten";
};


// calibratie punten trainen
document.querySelectorAll(".dot").forEach(dot => {
    dot.addEventListener("click", () => {

        webgazer.recordScreenPosition(
            dot.offsetLeft,
            dot.offsetTop,
            "click"
        );

        dot.style.background = "green";
    });
});
</script>

</body>
</html>
