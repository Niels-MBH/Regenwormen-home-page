<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Dwell Timer Demo</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#1f2937;
  font-family:Arial,sans-serif;
}

.dwell-btn{
  position:relative;
  overflow:hidden;

  width:280px;
  height:90px;

  border:none;
  border-radius:20px;

  font-size:1.3rem;
  font-weight:bold;

  background:#22c55e;
  color:white;

  cursor:pointer;

  box-shadow:0 6px 0 #15803d;
}

/* voortgang ring */
.dwell-ring{
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;

  background:
    conic-gradient(
      rgba(255,255,255,.45) 0deg,
      transparent 0deg
    );
}

/* knop tekst */
.btn-text{
  position:relative;
  z-index:2;
}

.info{
  position:fixed;
  bottom:30px;
  color:white;
  font-size:1rem;
}

</style>
</head>
<body>

<button class="dwell-btn" id="dwellButton">

  <span class="btn-text">
    Hover om door te gaan.
  </span>

  <div class="dwell-ring"></div>

</button>

<div class="info">
  Houd je muis 2 seconden stil op de knop.
</div>

<script>

/* =========================
   INSTELLINGEN
========================= */

const dwellTime = 2000;

const button =
  document.getElementById("dwellButton");

const ring =
  button.querySelector(".dwell-ring");

let timer = null;

/* =========================
   START DWELL
========================= */

button.addEventListener("mouseenter", () => {

  const start = Date.now();

  timer = setInterval(() => {

    const progress =
      Math.min(
        (Date.now() - start) / dwellTime,
        1
      );

    /* ring vullen */
    ring.style.background =
      `conic-gradient(
        rgba(255,255,255,.45)
        ${progress * 360}deg,
        transparent 0deg
      )`;

    /* klaar */
    if(progress >= 1){

      clearInterval(timer);

      /* andere pagina openen */
      window.location.href = "pagina2.html";

    }

  },16);

});

/* =========================
   RESET ALS MUIS WEGGAAT
========================= */

button.addEventListener("mouseleave", () => {

  clearInterval(timer);

  ring.style.background = "";

});

</script>

</body>
</html>
