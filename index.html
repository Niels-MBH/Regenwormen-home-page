<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oogbesturing – WebGazer Test</title>

  <!-- WebGazer -->
  <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

  <!-- FIX: controleren of WebGazer geladen is -->
  <script>
    window.addEventListener('load', () => {
      if (typeof webgazer === "undefined") {
        alert("WebGazer is niet geladen.");
      } else {
        console.log("WebGazer succesvol geladen.");
      }
    });
  </script>

  <style>
    body{
      margin:0;
      background:#080c14;
      color:white;
      font-family:Arial,sans-serif;
      overflow:hidden;
    }

    #webgazerVideoFeed,
    #webgazerVideoCanvas,
    #webgazerFaceOverlay,
    #webgazerFaceFeedbackBox{
      z-index:1 !important;
      position:fixed !important;
      bottom:16px !important;
      left:16px !important;
      border-radius:10px !important;
      border:1px solid #1c3050 !important;
    }

    #ui-overlay{
      position:fixed;
      inset:0;
      z-index:10;
      pointer-events:none;
    }

    #topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px;
      background:rgba(0,0,0,0.8);
      pointer-events:all;
    }

    .btn{
      padding:10px 18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
      margin-left:8px;
    }

    #btn-start{
      background:#00e5ff;
      color:black;
    }

    #btn-calibrate{
      background:#ffaa00;
      color:black;
    }

    #btn-reset{
      background:#ff3b3b;
      color:white;
    }

    #instruction-banner{
      text-align:center;
      padding:10px;
      color:#ffaa00;
      font-weight:bold;
    }

    #gaze-cursor{
      position:fixed;
      width:30px;
      height:30px;
      border-radius:50%;
      border:3px solid #00e5ff;
      background:rgba(0,229,255,0.2);
      pointer-events:none;
      z-index:20;
      transform:translate(-50%,-50%);
      left:-100px;
      top:-100px;
    }

    .cal-dot{
      position:fixed;
      width:42px;
      height:42px;
      border-radius:50%;
      background:#222;
      border:3px solid #555;
      z-index:30;
      transform:translate(-50%,-50%);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .cal-dot.active{
      background:rgba(255,170,0,0.2);
      border-color:#ffaa00;
      box-shadow:0 0 20px rgba(255,170,0,0.8);
    }

    .cal-dot.done{
      background:rgba(57,255,20,0.2);
      border-color:#39ff14;
    }

    #splash{
      position:fixed;
      inset:0;
      z-index:99;
      background:#080c14;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:20px;
      text-align:center;
      padding:20px;
    }

    .start-btn{
      padding:16px 32px;
      font-size:20px;
      border:none;
      border-radius:12px;
      background:#00e5ff;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    #status{
      position:fixed;
      right:20px;
      bottom:20px;
      z-index:15;
      background:rgba(0,0,0,0.7);
      padding:12px;
      border-radius:10px;
      font-family:monospace;
    }
  </style>
</head>
<body>

<div id="splash">
  <h1>👁 Oogbesturing Test</h1>
  <p>
    Test WebGazer eye tracking voor Regenwormen.
  </p>
  <button class="start-btn" id="btn-splash-start">
    Start Eye Tracking
  </button>
</div>

<div id="ui-overlay">
  <div id="topbar">
    <div>👁 Oogbesturing</div>

    <div>
      <button class="btn" id="btn-start">Start</button>
      <button class="btn" id="btn-calibrate">Kalibreer</button>
      <button class="btn" id="btn-reset">Reset</button>
    </div>
  </div>

  <!-- FIX: dubbele id verwijderd -->
  <div id="instruction-banner"></div>
</div>

<div id="gaze-cursor"></div>

<div id="status">
  X: <span id="coord-x">0</span><br>
  Y: <span id="coord-y">0</span><br>
  Face: <span id="face-status">nee</span>
</div>

<script>
/* =========================================================
   CONFIG
========================================================= */

const CONFIG = {
  SMOOTHING: 0.8,
  CLICKS_PER_DOT: 5
};

const state = {
  tracking:false,
  smoothX:window.innerWidth/2,
  smoothY:window.innerHeight/2,
  currentDot:0,
  currentClicks:0
};

const gazeCursor = document.getElementById("gaze-cursor");

let calibrationDots = [];

/* =========================================================
   SMOOTHING
========================================================= */

function smooth(rawX, rawY){
  const a = CONFIG.SMOOTHING;

  state.smoothX = a * state.smoothX + (1-a) * rawX;
  state.smoothY = a * state.smoothY + (1-a) * rawY;

  return {
    x: state.smoothX,
    y: state.smoothY
  };
}

/* =========================================================
   WEBGAZER START
========================================================= */

async function startTracking(){

  try{

    // FIX: TFFacemesh vervangen door clmtrackr
    await webgazer
      .setRegression('ridge')
      .setTracker('clmtrackr')
      .setGazeListener(onGaze)
      .showPredictionPoints(false)
      .begin();

    state.tracking = true;

    document.getElementById("instruction-banner").innerHTML =
      "Tracking actief. Klik op Kalibreer.";

    styleWebGazer();

    console.log("Tracking gestart");

  }catch(err){

    console.error(err);
    alert("Fout bij starten: " + err.message);

  }
}

/* =========================================================
   WEBGAZER STYLE FIX
========================================================= */

function styleWebGazer(){

  const ids = [
    "webgazerVideoFeed",
    "webgazerVideoCanvas",
    "webgazerFaceOverlay",
    "webgazerFaceFeedbackBox"
  ];

  ids.forEach(id=>{

    const el = document.getElementById(id);

    if(el){

      el.style.zIndex = "1";
      el.style.position = "fixed";
      el.style.bottom = "16px";
      el.style.left = "16px";

    }

  });

}

/* =========================================================
   GAZE CALLBACK
========================================================= */

function onGaze(data){

  if(!data){

    document.getElementById("face-status").textContent = "nee";
    return;

  }

  document.getElementById("face-status").textContent = "ja";

  const smoothed = smooth(data.x, data.y);

  const x = Math.max(0, Math.min(window.innerWidth, smoothed.x));
  const y = Math.max(0, Math.min(window.innerHeight, smoothed.y));

  gazeCursor.style.left = x + "px";
  gazeCursor.style.top = y + "px";

  document.getElementById("coord-x").textContent = Math.round(x);
  document.getElementById("coord-y").textContent = Math.round(y);

  // HIER gebruik je later je spel controls
  window.EyeTracker = {
    x,
    y,
    pctX:x/window.innerWidth,
    pctY:y/window.innerHeight
  };

}

/* =========================================================
   CALIBRATIE
========================================================= */

function calibrationPositions(){

  return [
    [0.1,0.1],
    [0.5,0.1],
    [0.9,0.1],

    [0.1,0.5],
    [0.5,0.5],
    [0.9,0.5],

    [0.1,0.9],
    [0.5,0.9],
    [0.9,0.9]
  ];

}

function createCalibration(){

  removeCalibration();

  const positions = calibrationPositions();

  positions.forEach((pos,index)=>{

    const dot = document.createElement("div");

    dot.className = "cal-dot";
    dot.innerText = index+1;

    dot.style.left = (pos[0]*window.innerWidth)+"px";
    dot.style.top = (pos[1]*window.innerHeight)+"px";

    dot.addEventListener("click", ()=>clickCalibration(index));

    document.body.appendChild(dot);

    calibrationDots.push(dot);

  });

  activateDot(0);

}

function activateDot(index){

  calibrationDots.forEach((dot,i)=>{

    dot.classList.remove("active");

    if(i === index){
      dot.classList.add("active");
    }

  });

  state.currentDot = index;
  state.currentClicks = 0;

}

function clickCalibration(index){

  if(index !== state.currentDot) return;

  const positions = calibrationPositions();

  const x = positions[index][0] * window.innerWidth;
  const y = positions[index][1] * window.innerHeight;

  webgazer.recordScreenPosition(x,y,'click');

  state.currentClicks++;

  if(state.currentClicks >= CONFIG.CLICKS_PER_DOT){

    calibrationDots[index].classList.remove("active");
    calibrationDots[index].classList.add("done");

    if(index >= calibrationDots.length-1){

      document.getElementById("instruction-banner").innerHTML =
        "✅ Kalibratie klaar";

    }else{

      activateDot(index+1);

    }

  }

}

function removeCalibration(){

  calibrationDots.forEach(dot=>dot.remove());
  calibrationDots=[];

}

/* =========================================================
   RESET
========================================================= */

function resetEverything(){

  try{
    webgazer.end();
  }catch(e){}

  removeCalibration();

  state.tracking = false;

  gazeCursor.style.left = "-100px";
  gazeCursor.style.top = "-100px";

  document.getElementById("instruction-banner").innerHTML =
    "Gerest.";

}

/* =========================================================
   EVENTS
========================================================= */

document.getElementById("btn-splash-start")
  .addEventListener("click", ()=>{

    document.getElementById("splash").style.display = "none";

    startTracking();

});

document.getElementById("btn-start")
  .addEventListener("click", startTracking);

document.getElementById("btn-calibrate")
  .addEventListener("click", createCalibration);

document.getElementById("btn-reset")
  .addEventListener("click", resetEverything);

window.addEventListener("resize", ()=>{

  if(calibrationDots.length){

    const positions = calibrationPositions();

    calibrationDots.forEach((dot,i)=>{

      dot.style.left = (positions[i][0]*window.innerWidth)+"px";
      dot.style.top = (positions[i][1]*window.innerHeight)+"px";

    });

  }

});
</script>

</body>
</html>
