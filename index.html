<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eye Tracking</title>

  <!-- WebGazer -->
  <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      cursor: none;
    }

    #dot {
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
      position: absolute;
      transform: translate(-50%, -50%);
      left: 50%;
      top: 50%;
    }

    #text {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div id="dot"></div>
<div id="text">Eye tracking actief...</div>

<script>
  const dot = document.getElementById("dot");

  let smoothX = window.innerWidth / 2;
  let smoothY = window.innerHeight / 2;

  window.onload = function () {

    webgazer.setGazeListener((data) => {
      if (!data) return;

      const x = data.x;
      const y = data.y;

      // smoothing (stabieler beeld)
      smoothX = smoothX * 0.85 + x * 0.15;
      smoothY = smoothY * 0.85 + y * 0.15;

      // verplaats dot
      dot.style.left = smoothX + "px";
      dot.style.top = smoothY + "px";

      // 👉 HIER kun je koppelen aan je regenwormen spel:
      // onEyeMove(smoothX, smoothY);

    }).begin();

    // UI uitzetten (belangrijk)
    webgazer.showVideoPreview(false)
            .showFaceOverlay(false)
            .showFaceFeedbackBox(false);

    console.log("Eye tracking gestart");
  };
</script>

</body>
</html>
